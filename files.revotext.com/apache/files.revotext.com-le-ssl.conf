# Auto-generated by certbot when the cert was issued.
# Kept in the repo for reference — the actual file on the server is at
# /etc/apache2/sites-available/files.revotext.com-le-ssl.conf and is managed
# by certbot's --apache installer. Do not hand-edit unless certbot is disabled.

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName files.revotext.com
    DocumentRoot /var/www/files.revotext.com/public

    <Directory /var/www/files.revotext.com/public>
        AllowOverride All
        Require all granted
        CGIPassAuth On
    </Directory>
    <Directory /var/www/files.revotext.com/api>
        Require all denied
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/files-error.log
    CustomLog ${APACHE_LOG_DIR}/files-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/files.revotext.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/files.revotext.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
