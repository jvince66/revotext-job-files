<VirtualHost *:80>
    ServerName presign.revotext.com
    DocumentRoot /var/www/presign.revotext.com/public

    <Directory /var/www/presign.revotext.com/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/presign.revotext.com/api>
        Require all denied
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/presign-error.log
    CustomLog ${APACHE_LOG_DIR}/presign-access.log combined
</VirtualHost>
