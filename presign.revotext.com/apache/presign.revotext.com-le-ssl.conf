# Auto-generated by certbot when the cert was issued.
# Kept in the repo for reference.

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName presign.revotext.com
    DocumentRoot /var/www/presign.revotext.com/public

    <Directory /var/www/presign.revotext.com/public>
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/presign.revotext.com/api>
        Require all denied
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/presign-error.log
    CustomLog ${APACHE_LOG_DIR}/presign-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/presign.revotext.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/presign.revotext.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
